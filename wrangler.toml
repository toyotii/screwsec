import { getAssetFromKV } from '@cloudflare/kv-asset-handler';
import manifestJSON from '__STATIC_CONTENT_MANIFEST';
const assetManifest = JSON.parse(manifestJSON);

export default {
  async fetch(request, env, ctx) {
    const url = new URL(request.url);

    // Handle CORS preflight
    if (request.method === 'OPTIONS') {
      return new Response(null, {
        headers: {
          'Access-Control-Allow-Origin': '*',
          'Access-Control-Allow-Methods': 'POST, OPTIONS',
          'Access-Control-Allow-Headers': 'Content-Type'
        }
      });
    }

    // Handle API route
    if (url.pathname === '/api/generate' && request.method === 'POST') {
      return handleGenerate(request, env);
    }

    // Serve static files
    try {
      return await getAssetFromKV(
        { request, waitUntil: ctx.waitUntil.bind(ctx) },
        { ASSET_NAMESPACE: env.__STATIC_CONTENT, ASSET_MANIFEST: assetManifest }
      );
    } catch (e) {
      return new Response('Not found', { status: 404 });
    }
  }
};

async function handleGenerate(request, env) {
  const apiKey = env.GROQ_API_KEY;
  if (!apiKey) {
    return json({ error: 'GROQ_API_KEY не настроен' }, 500);
  }

  let body;
  try { body = await request.json(); }
  catch (e) { return json({ error: 'Invalid JSON' }, 400); }

  const {
    companyName = 'Компания', industry = 'не указана', size = 'не указан',
    dataType = 'не указаны', sensitiveData = 'нет', infra = 'не указана',
    remoteWork = 'нет', thirdParty = 'нет', currentPolicy = 'нет',
    incidents = 'нет', compliance = 'не указано', secStaff = 'нет', reason = 'не указана'
  } = body;

  const industryRules = {
    'IT': 'Защита исходного кода, безопасность CI/CD, управление доступом к репозиториям, защита API-ключей.',
    'Финансы': 'Требования Банка России (382-П, 683-П), PCI DSS, многофакторная аутентификация, мониторинг аномалий.',
    'Медицина': 'Врачебная тайна (ст. 13 ФЗ-323), специальные категории ПДн (ст. 10 152-ФЗ), журналирование доступа к медкартам.',
    'Торговля': 'Защита данных покупателей, PCI DSS для эквайринга, безопасность CRM и 1С.',
    'Производство': 'Защита технологических секретов, безопасность АСУ ТП, физический доступ к производственным зонам.',
    'Юридические': 'Адвокатская тайна, конфиденциальность клиентских данных, шифрование переписки.'
  };

  let industrySpecific = 'Учти специфику отрасли.';
  for (const key of Object.keys(industryRules)) {
    if (industry.includes(key)) { industrySpecific = industryRules[key]; break; }
  }

  const prompt = `Ты опытный специалист по информационной безопасности в России. Напиши детальную политику информационной безопасности.

ДАННЫЕ КОМПАНИИ:
- Название: ${companyName}
- Отрасль: ${industry}
- Сотрудников: ${size}
- Данные: ${dataType}
- Чувствительные данные: ${sensitiveData}
- Инфраструктура: ${infra}
- Удалённая работа: ${remoteWork}
- Подрядчики с доступом: ${thirdParty}
- Текущее состояние ИБ: ${currentPolicy}
- Инциденты ранее: ${incidents}
- Нормативные требования: ${compliance}
- Специалист по ИБ: ${secStaff}
- Причина создания: ${reason}

ОТРАСЛЕВАЯ СПЕЦИФИКА: ${industrySpecific}

СТРУКТУРА:
1. ОБЩИЕ ПОЛОЖЕНИЯ
2. ТЕРМИНЫ И ОПРЕДЕЛЕНИЯ
3. РОЛИ И ОТВЕТСТВЕННОСТЬ
4. КЛАССИФИКАЦИЯ ИНФОРМАЦИИ
5. УПРАВЛЕНИЕ ДОСТУПОМ
6. ЗАЩИТА ИНФОРМАЦИОННЫХ СИСТЕМ
7. ФИЗИЧЕСКАЯ БЕЗОПАСНОСТЬ
8. ${remoteWork !== 'нет' ? 'УДАЛЁННАЯ РАБОТА' : 'СЕТЕВАЯ БЕЗОПАСНОСТЬ'}
9. РАБОТА С ПЕРСОНАЛЬНЫМИ ДАННЫМИ
10. РЕАГИРОВАНИЕ НА ИНЦИДЕНТЫ
11. ОБУЧЕНИЕ ПЕРСОНАЛА
12. КОНТРОЛЬ И ОТВЕТСТВЕННОСТЬ

Правила: конкретные цифры и сроки, упоминай "${companyName}", адаптируй под отрасль, без markdown, объём 900-1100 слов, только текст документа.`;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: 'Ты специалист по информационной безопасности с 15-летним опытом в России. Пишешь уникальные документы под каждую организацию.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.85,
        max_tokens: 2500
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      return json({ error: err.error?.message || `Groq error: ${response.status}` }, response.status);
    }

    const data = await response.json();
    const text = data.choices?.[0]?.message?.content;
    if (!text) return json({ error: 'Empty response' }, 500);

    return json({ result: text });

  } catch (err) {
    return json({ error: err.message }, 500);
  }
}

function json(data, status = 200) {
  return new Response(JSON.stringify(data), {
    status,
    headers: { 'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*' }
  });
}
